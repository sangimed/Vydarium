services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vidravault
      POSTGRES_USER: vidravault
      POSTGRES_PASSWORD: vidravault
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
